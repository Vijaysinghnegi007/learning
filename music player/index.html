<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Song List</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>

  <body>
    <main class="main">
      <section class="main-wrapper">
        <!-- LEFT SIDE -->
        <div class="left"></div>

        <!-- RIGHT SIDE -->
        <div class="right">
          <h3>All Songs</h3>

          <div class="all-songs">
            <!-- SONG CARD -->
          </div>
        </div>
      </section>
      <!-- 
      <section class="player">
     
        <button class="previous">
          <i class="fa-solid fa-backward-step"></i>
        </button>

    

        <button class="play">
          <i class="fa-solid fa-play play-icon"></i>
       
        </button>

    
        <button class="next">
          <i class="fa-solid fa-forward-step"></i>
        </button>
      </section> -->

      <section class="player">
        <div class="controls">
          <button class="control-btn shuffle" title="Shuffle">
            <i class="fa-solid fa-shuffle"></i>
          </button>

          <button class="control-btn previous" title="Previous">
            <i class="fa-solid fa-backward-step"></i>
          </button>

          <button class="control-btn play" title="Play">
            <i class="fa-solid fa-play play-icon"></i>
          </button>

          <button class="control-btn next" title="Next">
            <i class="fa-solid fa-forward-step"></i>
          </button>

          <button class="control-btn repeat" title="Repeat">
            <i class="fa-solid fa-repeat repeat-icon"></i>
          </button>
        </div>
        <!-- progress bar -->
           <div class="progress-wrapper">
          <span class="current-time">0:00</span>

          <div class="progress-bar">
            <div class="progress-fill"></div>
          </div>

          <span class="total-time">0:00</span>
        </div>
        
      </section>
    
    </main>
    <script src="script.js"></script>
  </body>
</html>
